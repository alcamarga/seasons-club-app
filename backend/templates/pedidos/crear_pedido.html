<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Pedido - PizzaOS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 50px;
        }

        .container {
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        h2 {
            color: #d9534f;
            font-weight: bold;
        }

        .btn-pizza {
            background-color: #d9534f;
            color: white;
            border: none;
        }

        .btn-pizza:hover {
            background-color: #c9302c;
            color: white;
        }

        .signature {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #6c757d;
            border-top: 1px solid #eee;
            padding-top: 15px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="text-center mb-4">
            <h2>🍕 Registrar Nuevo Pedido</h2>
            <p class="text-muted">Selecciona los productos de la base de datos</p>
        </div>

        <form action="/pedidos/nuevo" method="POST">
            <div class="mb-3">
                <label class="form-label">Nombre del Cliente:</label>
                <input type="text" name="cliente" class="form-control" placeholder="Ej. Camilo" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Selecciona la Pizza:</label>
                <select name="pizzas" class="form-select">
                    {% for insumo in insumos %}
                    <option value="{{ insumo.nombre }}">
                        {{ insumo.nombre }} - ${{ insumo.precio }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Dirección:</label>
                <input type="text" name="direccion" class="form-control" placeholder="Calle 123..." required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-pizza btn-lg">Confirmar Pedido</button>
                <a href="/pedidos/listar" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>

        <div class="signature">
            Creado por <strong>Camilo Martinez</strong><br>
            27 de abril de 2026
        </div>
    </div>
</body>

</html>
