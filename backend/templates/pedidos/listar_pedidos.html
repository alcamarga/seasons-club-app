<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Historial de Pedidos - PizzaOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar {
            background-color: #d63031;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🍕 PizzaOS - Panel de Control</span>
        </div>
    </nav>

    <div class="container">
        <div class="table-container">
            <h2 class="mb-4 text-center">Últimos Pedidos</h2>
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Cliente</th>
                        <th>Pizza</th>
                        <th>Dirección</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody>
                    {% for pedido in pedidos %}
                    <tr>
                        <td><strong>{{ pedido.cliente }}</strong></td>
                        <td><span class="badge bg-success">{{ pedido.pizzas }}</span></td>
                        <td>{{ pedido.direccion }}</td>
                        <td>{{ pedido.fecha.strftime('%d/%m/%Y %H:%M') }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <div class="text-center mt-4">
                <a href="/pedidos/nuevo" class="btn btn-danger btn-lg">Nuevo Pedido</a>
            </div>
        </div>
    </div>
</body>

</html>
