name: PizzaOS CI/CD Pipeline

on:
  push:
    branches:
      - main  # Se activa al hacer push a la rama principal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Descargar el código del repositorio
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Iniciar sesión en Azure usando las credenciales del Service Principal
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 3. Iniciar sesión en el Azure Container Registry (ACR)
    - name: Log in to Azure Container Registry
      run: |
        az acr login --name acrpizzaos

    # 4. Compilar y subir la imagen del Backend (API)
    - name: Build & Push Backend Image
      run: |
        docker build -t acrpizzaos.azurecr.io/backend:latest .
        docker push acrpizzaos.azurecr.io/backend:latest

    # 5. Compilar y subir la imagen del Frontend (Web)
    - name: Build & Push Frontend Image
      run: |
        docker build -t acrpizzaos.azurecr.io/frontend:latest ./frontend
        docker push acrpizzaos.azurecr.io/frontend:latest

    # 6. Desplegar / Reiniciar Web App del Backend
    - name: Deploy Backend Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: pizzaos-api
        images: 'acrpizzaos.azurecr.io/backend:latest'

    # 7. Desplegar / Reiniciar Web App del Frontend
    - name: Deploy Frontend Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: pizzaos-web
        images: 'acrpizzaos.azurecr.io/frontend:latest'
